<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAILY CHRONICLE | Premium News</title>
    
    <!-- Google AdSense Code -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1180121660205807" crossorigin="anonymous"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:ital@0;1&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fdfbf7; color: #1a1a1a; font-family: 'Montserrat', sans-serif; }
        .royal-font { font-family: 'Playfair Display', serif; }
        .serif-body { font-family: 'Libre Baskerville', serif; }
        .double-border { border-top: 4px solid #000; border-bottom: 1px solid #000; }
        .accent-color { color: #846733; }
        
        .news-card img { transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .news-card:hover img { transform: scale(1.03); }
        
        /* Reader Mode Styling */
        .dropcap::first-letter {
            font-family: 'Playfair Display', serif;
            float: left; font-size: 5rem; line-height: 1;
            padding-right: 0.5rem; color: #000; font-weight: 900;
        }

        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid #e2e8f0; border-top-color: #846733;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Modal Overlay */
        #page-overlay { 
            display: none; 
            position: fixed; inset: 0; background: #fdfbf7; z-index: 100;
            overflow-y: auto;
        }
        #page-overlay.active { display: block; }
    </style>
</head>
<body class="relative">

    <!-- Universal Overlay (For Reader Mode and Static Pages) -->
    <div id="page-overlay">
        <div class="max-w-4xl mx-auto px-6 py-20 relative">
            <button onclick="closeOverlay()" class="fixed top-8 right-8 z-[110] bg-black text-white px-4 py-2 text-xs font-bold tracking-widest hover:bg-amber-800 transition">
                CLOSE [X]
            </button>
            <div id="overlay-content"></div>
        </div>
    </div>

    <!-- Header Section -->
    <header class="max-w-7xl mx-auto px-6 pt-8">
        <div class="flex flex-col items-center border-b border-gray-200 pb-6">
            <div id="date-box" class="text-[10px] font-bold tracking-[0.3em] uppercase mb-4 text-gray-500"></div>
            <h1 class="royal-font text-6xl md:text-8xl tracking-tighter text-center leading-none cursor-pointer" onclick="window.location.reload()">
                DAILY CHRONICLE
            </h1>
            <p class="serif-body italic text-gray-500 mt-4 text-sm md:text-lg">Refined Journalism for the Global Citizen</p>
        </div>

        <nav class="double-border py-3 my-6 sticky top-0 bg-[#fdfbf7]/95 backdrop-blur-md z-50">
            <div class="flex flex-wrap justify-center gap-6 md:gap-10 text-[11px] font-bold uppercase tracking-widest">
                <button onclick="fetchWorldNews('world')" class="hover:text-amber-700 transition">Global</button>
                <button onclick="fetchWorldNews('technology')" class="hover:text-amber-700 transition">Technology</button>
                <button onclick="fetchWorldNews('business')" class="hover:text-amber-700 transition">Markets</button>
                <button onclick="fetchWorldNews('politics')" class="hover:text-amber-700 transition">Politics</button>
                <button onclick="fetchWorldNews('sports')" class="hover:text-amber-700 transition">Sports</button>
                <button onclick="fetchWorldNews('entertainment')" class="hover:text-amber-700 transition">Lifestyle</button>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 mb-20 min-h-screen">
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="loading-spinner mb-4"></div>
            <p class="serif-body italic text-gray-500">Retrieving today's edition...</p>
        </div>

        <div id="content-area" class="hidden">
            <!-- Hero Story -->
            <section id="hero-section" class="grid grid-cols-1 lg:grid-cols-12 gap-10 mb-16 border-b border-gray-200 pb-16"></section>
            
            <div class="flex justify-between items-center mb-8">
                <h2 class="royal-font text-3xl font-bold italic">Latest Dispatches</h2>
                <div class="h-[1px] bg-gray-300 flex-grow ml-6"></div>
            </div>
            
            <!-- News Grid -->
            <section id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></section>
        </div>

        <div id="error-box" class="hidden text-center py-20 border-2 border-dashed border-gray-200">
            <p class="royal-font text-2xl text-red-800 mb-2">Notice</p>
            <p id="error-message" class="serif-body italic text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-black text-white px-6 py-2 text-xs font-bold uppercase underline">Reload Desk</button>
        </div>
    </main>

    <footer class="bg-white border-t-4 border-black py-16">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="royal-font text-4xl mb-4 tracking-tighter">DAILY CHRONICLE</h2>
            <div class="flex justify-center gap-8 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                <button onclick="showStaticPage('about')" class="hover:text-black transition">About Us</button>
                <button onclick="showStaticPage('privacy')" class="hover:text-black transition">Privacy Policy</button>
                <button onclick="showStaticPage('contact')" class="hover:text-black transition">Contact</button>
            </div>
        </div>
    </footer>

    <script>
        const API_KEY = '9953be50f7d943cc8cf30a5204cf0d3e';
        let articlesData = []; 

        document.getElementById('date-box').innerText = new Date().toLocaleDateString('en-US', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });

        async function fetchWorldNews(category = 'world') {
            const loader = document.getElementById('loader');
            const content = document.getElementById('content-area');
            const errorBox = document.getElementById('error-box');
            
            loader.classList.remove('hidden');
            content.classList.add('hidden');
            errorBox.classList.add('hidden');

            try {
                const url = `https://api.worldnewsapi.com/search-news?api-key=${API_KEY}&text=${category}&language=en&number=10`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.news && data.news.length > 0) {
                    articlesData = data.news; 
                    renderArticles(articlesData);
                    loader.classList.add('hidden');
                    content.classList.remove('hidden');
                } else {
                    throw new Error("Section currently unavailable.");
                }
            } catch (error) {
                loader.classList.add('hidden');
                errorBox.classList.remove('hidden');
                document.getElementById('error-message').innerText = "Unable to connect to news bureaus. API limit might be reached.";
            }
        }

        function renderArticles(articles) {
            const hero = document.getElementById('hero-section');
            const grid = document.getElementById('news-grid');
            hero.innerHTML = '';
            grid.innerHTML = '';

            const top = articles[0];
            hero.innerHTML = `
                <div class="lg:col-span-8 overflow-hidden cursor-pointer" onclick="openReader(0)">
                    <img src="${top.image || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200'}" 
                         class="w-full h-[500px] object-cover news-card shadow-xl">
                </div>
                <div class="lg:col-span-4 flex flex-col justify-center">
                    <span class="accent-color font-bold text-xs uppercase tracking-widest mb-4">Headline Story</span>
                    <h2 class="royal-font text-4xl font-black mb-6 leading-tight hover:text-amber-900 cursor-pointer" onclick="openReader(0)">
                        ${top.title}
                    </h2>
                    <p class="serif-body text-gray-600 mb-6 leading-relaxed">
                        ${top.text ? top.text.substring(0, 200) + '...' : 'Click to view the full exclusive dispatch.'}
                    </p>
                    <button onclick="openReader(0)" class="text-left font-bold text-xs uppercase border-b border-black w-max pb-1 hover:text-amber-700 transition">Read Full Report</button>
                </div>
            `;

            articles.slice(1).forEach((article, index) => {
                const card = document.createElement('div');
                card.className = "news-card flex flex-col group cursor-pointer";
                card.onclick = () => openReader(index + 1);
                card.innerHTML = `
                    <div class="overflow-hidden mb-6 h-64 bg-gray-100">
                        <img src="${article.image || 'https://images.unsplash.com/photo-1495020689067-958852a7765e?w=800'}" class="w-full h-full object-cover">
                    </div>
                    <span class="text-[10px] font-black uppercase tracking-tighter text-gray-400 mb-2">Exclusive</span>
                    <h3 class="royal-font text-xl font-bold mb-3 leading-snug group-hover:text-amber-800 transition">${article.title}</h3>
                    <p class="serif-body text-sm text-gray-500 line-clamp-3 mb-4">${article.text || 'Press to read details.'}</p>
                    <div class="mt-auto pt-4 border-t border-gray-100 flex justify-between text-[9px] font-bold uppercase text-gray-400">
                        <span>Dispatch #${index + 2}</span>
                        <span>${new Date(article.publish_date).toLocaleDateString()}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Reader Mode Function
        function openReader(index) {
            const article = articlesData[index];
            const overlay = document.getElementById('page-overlay');
            const content = document.getElementById('overlay-content');
            
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            content.innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <div class="text-center mb-12">
                        <span class="accent-color font-bold text-xs uppercase tracking-[0.3em]">The Daily Chronicle Exclusive</span>
                        <h1 class="royal-font text-5xl font-black mt-4 leading-tight">${article.title}</h1>
                        <div class="mt-6 flex justify-center items-center gap-4 text-[10px] font-bold uppercase text-gray-400">
                            <span>Published: ${new Date(article.publish_date).toDateString()}</span>
                            <span class="h-1 w-1 bg-gray-300 rounded-full"></span>
                            <span>Source: Global News Desk</span>
                        </div>
                    </div>

                    <img src="${article.image || ''}" class="w-full h-auto mb-10 shadow-2xl">

                    <div class="serif-body text-xl leading-relaxed text-gray-800 dropcap">
                        ${article.text || 'Full content unavailable for this preview.'}
                    </div>

                    <div class="mt-16 pt-10 border-t border-gray-200 text-center">
                        <p class="serif-body italic text-gray-500 mb-4">End of dispatch.</p>
                        <a href="${article.url}" target="_blank" class="text-xs font-bold uppercase tracking-widest bg-black text-white px-8 py-3 hover:bg-amber-800 transition">
                            Visit Original Source
                        </a>
                    </div>
                </div>
            `;
            window.scrollTo({ top: 0 });
        }

        function showStaticPage(page) {
            const overlay = document.getElementById('page-overlay');
            const content = document.getElementById('overlay-content');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            if (page === 'about') {
                content.innerHTML = `<h2 class="royal-font text-5xl mb-8 border-b-2 border-black pb-4 text-center">About Us</h2>
                <p class="serif-body text-xl leading-relaxed text-center max-w-2xl mx-auto">The Daily Chronicle is a premium news curator dedicated to high-impact journalism in an elegant traditional format.</p>`;
            } else if (page === 'privacy') {
                content.innerHTML = `<h2 class="royal-font text-5xl mb-8 border-b-2 border-black pb-4 text-center">Privacy Policy</h2>
                <p class="serif-body text-lg text-gray-700 max-w-2xl mx-auto">We value your privacy. This site uses World News API for content and Google AdSense for advertisements. We do not store personal reader data.</p>`;
            } else if (page === 'contact') {
                content.innerHTML = `<h2 class="royal-font text-5xl mb-8 border-b-2 border-black pb-4 text-center">Contact Us</h2>
                <div class="text-center">
                    <p class="serif-body text-xl mb-6">Direct inquiries to:</p>
                    <a href="mailto:h05828990@gmail.com" class="royal-font text-4xl underline hover:text-amber-800 transition">h05828990@gmail.com</a>
                </div>`;
            }
        }

        function closeOverlay() {
            document.getElementById('page-overlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        fetchWorldNews();
    </script>
</body>
</html>
